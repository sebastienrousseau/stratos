# SPDX-License-Identifier: MIT
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Silence the GitHub-Actions Node 20 deprecation warning (forced cutover
# on 2026-06-16) by opting every JS action into Node 24 now.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: test (node ${{ matrix.node }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22', '24']
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install devDependencies
        run: npm ci || npm install
      - name: Run tests
        env:
          STRATOS_NO_KEYCHAIN: '1'
        run: npm test
      - name: Coverage gate (Node 22 / Ubuntu only)
        if: matrix.node == '22' && matrix.os == 'ubuntu-latest'
        env:
          STRATOS_NO_KEYCHAIN: '1'
        run: npm run coverage:check
      - name: Documentation gate (Node 22 / Ubuntu only)
        if: matrix.node == '22' && matrix.os == 'ubuntu-latest'
        run: npm run docs:check

  lint-installers:
    name: lint installers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: shellcheck install/install.sh scripts/preflight-release.sh
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Invoke-ScriptAnalyzer -Path install/install.ps1 -EnableExit
        continue-on-error: true

  lint-workflows:
    # Catches the class of bug that produced the v0.0.10 / v0.0.11 ghost tags:
    # release.yml YAML parse errors and shellcheck issues in `run:` blocks.
    # Without this, the first signal that release.yml was broken came when
    # the tag fired the workflow at parse time.
    name: lint workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        run: |
          mkdir -p "$HOME/.local/bin"
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) latest "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: actionlint
        run: actionlint -color .github/workflows/*.yml

  check-versions:
    # Single source of truth for the version string. Catches the class of
    # bug that produced v0.0.11 (branched off main before PR #10's YAML
    # fix merged → release.yml carried forward broken) and any future
    # version-string drift between stratos.mjs / package.json / installers
    # / CHANGELOG / router tests. Also asserts install.sh EXPECTED_SHA
    # matches stratos.mjs's actual SHA — same class as the v0.0.6 bug.
    name: check-versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: node scripts/check-versions.mjs

  smoke:
    name: smoke (offline commands)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: node stratos.mjs version
      - run: node stratos.mjs help
      - run: node stratos.mjs completion bash | head -3
      - run: |
          export SIGNED_URL_SECRET=ci-secret
          node stratos.mjs signed /test.pdf --expires 1700000000
