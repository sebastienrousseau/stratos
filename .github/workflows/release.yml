# SPDX-License-Identifier: MIT
#
# Publishes to npm with Sigstore provenance when a v* tag lands on main.
# Also produces single-binary builds for linux-x64/arm64, darwin-x64/arm64,
# and win-x64, plus a CycloneDX SBOM, a CycloneDX VEX statement, a man
# page, a multi-arch Docker image, and a Homebrew formula. Attaches the
# canonical artefacts to the GitHub release with rich notes extracted
# from the CHANGELOG.
#
# Auth: npm Trusted Publishers (OIDC). No NPM_TOKEN secret is consumed.
# Setup is on the npm side at
#   https://www.npmjs.com/package/@cloudcdn/stratos/access
# Trusted Publisher → GitHub Actions → owner sebastienrousseau,
# repo stratos, workflow .github/workflows/release.yml, environment npm.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # OIDC + npm provenance + build provenance attestation
  attestations: write
  packages: write   # ghcr.io push for the Docker image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Publish to npm + push canonical artefacts (stratos.mjs, installers,
  # SHA256SUMS, SBOM, VEX, man page, Homebrew formula) to the GitHub release
  # with body populated from the matching CHANGELOG.md section.
  # ───────────────────────────────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@cloudcdn/stratos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm has OIDC trusted-publisher support
        run: |
          set -e
          npm --version
          npm install -g npm@latest
          npm --version

      - name: Install devDependencies
        run: npm ci || npm install

      - name: Run tests
        env:
          STRATOS_NO_KEYCHAIN: '1'
        run: npm test

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/extract-release-notes.mjs "$VERSION" > dist/release-notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "---"
          head -40 dist/release-notes.md

      - name: Generate man page
        run: |
          node scripts/make-man.mjs > dist/stratos.1
          gzip -k -9 dist/stratos.1

      - name: Generate CycloneDX SBOM
        # `--omit dev` keeps the published SBOM scoped to runtime
        # dependencies (Stratos has zero) rather than dev-only ones.
        run: |
          npx --yes @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file dist/sbom.cyclonedx.json \
            --spec-version 1.6 \
            --omit dev

      - name: Generate CycloneDX VEX
        # A standalone VEX (Vulnerability Exploitability eXchange)
        # statement asserting "no known affected vulnerabilities" for
        # this build of @cloudcdn/stratos. Re-issued every release.
        run: node scripts/make-vex.mjs "${{ steps.notes.outputs.version }}" > dist/vex.cyclonedx.json

      - name: Generate Homebrew formula
        run: |
          node scripts/make-homebrew.mjs "${{ steps.notes.outputs.version }}" > dist/stratos.rb

      - name: Compute SHA256SUMS
        run: |
          sha256sum stratos.mjs install/install.sh install/install.ps1 \
            dist/stratos.1.gz dist/sbom.cyclonedx.json dist/vex.cyclonedx.json \
            dist/stratos.rb > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            stratos.mjs
            dist/sbom.cyclonedx.json
            dist/vex.cyclonedx.json

      - name: Publish to npm (OIDC + provenance)
        run: npm publish --provenance --access public

      - name: Attach release artefacts + populate body
        uses: softprops/action-gh-release@v2
        with:
          name: Stratos v${{ steps.notes.outputs.version }}
          body_path: dist/release-notes.md
          files: |
            stratos.mjs
            install/install.sh
            install/install.ps1
            dist/stratos.1
            dist/stratos.1.gz
            dist/sbom.cyclonedx.json
            dist/vex.cyclonedx.json
            dist/stratos.rb
            SHA256SUMS

  # ───────────────────────────────────────────────────────────────────────────
  # Build self-contained binaries via Bun (`bun build --compile`).
  # ───────────────────────────────────────────────────────────────────────────
  binaries:
    needs: publish
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,  target: linux-x64,    out: stratos-linux-x64,    smoke: true }
          - { runner: ubuntu-latest,  target: linux-arm64,  out: stratos-linux-arm64,  smoke: false }
          - { runner: macos-latest,   target: darwin-arm64, out: stratos-darwin-arm64, smoke: true }
          - { runner: macos-13,       target: darwin-x64,   out: stratos-darwin-x64,   smoke: true }
          - { runner: windows-latest, target: win-x64,      out: stratos-win-x64.exe,  smoke: true }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build single-file binary (${{ matrix.target }})
        shell: bash
        run: node scripts/build-binary.mjs --target ${{ matrix.target }}

      - name: Smoke (${{ matrix.target }})
        if: matrix.smoke
        shell: bash
        run: ./${{ matrix.out }} version

      - name: Attest binary build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ matrix.out }}

      - name: Attach binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.out }}

  # ───────────────────────────────────────────────────────────────────────────
  # Multi-arch Docker image. Published to ghcr.io under the repo owner's
  # namespace; tagged with the version and `latest`.
  # ───────────────────────────────────────────────────────────────────────────
  docker:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/sebastienrousseau/stratos:${{ github.ref_name }}
            ghcr.io/sebastienrousseau/stratos:${{ github.ref_name == 'main' && 'edge' || github.ref_name }}
            ghcr.io/sebastienrousseau/stratos:latest
          labels: |
            org.opencontainers.image.title=stratos
            org.opencontainers.image.description=Official CloudCDN CLI
            org.opencontainers.image.source=https://github.com/sebastienrousseau/stratos
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.licenses=MIT

      - name: Attest Docker image provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/sebastienrousseau/stratos
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
