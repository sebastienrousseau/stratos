# SPDX-License-Identifier: MIT
#
# Publishes to npm with Sigstore provenance when a v* tag lands on main.
# Also produces single-binary builds for linux-x64/arm64, darwin-x64/arm64,
# and win-x64, plus a CycloneDX SBOM, a CycloneDX VEX statement, a man
# page, a multi-arch Docker image, and a Homebrew formula. Attaches the
# canonical artefacts to the GitHub release with rich notes extracted
# from the CHANGELOG.
#
# Auth: npm Trusted Publishers (OIDC). No NPM_TOKEN secret is consumed.
# Setup is on the npm side at
#   https://www.npmjs.com/package/@cloudcdn/stratos/access
# Trusted Publisher → GitHub Actions → owner sebastienrousseau,
# repo stratos, workflow .github/workflows/release.yml, environment npm.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # OIDC + npm provenance + build provenance attestation
  attestations: write
  packages: write   # ghcr.io push for the Docker image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Publish to npm + push canonical artefacts (stratos.mjs, installers,
  # SHA256SUMS, SBOM, VEX, man page, Homebrew formula) to the GitHub release
  # with body populated from the matching CHANGELOG.md section.
  # ───────────────────────────────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: npm
      url: https://www.npmjs.com/package/@cloudcdn/stratos
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm has OIDC trusted-publisher support
        run: |
          set -e
          npm --version
          npm install -g npm@latest
          npm --version

      - name: Install devDependencies
        run: npm ci || npm install

      - name: Run tests
        env:
          STRATOS_NO_KEYCHAIN: '1'
        run: npm test

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/extract-release-notes.mjs "$VERSION" > dist/release-notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "---"
          head -40 dist/release-notes.md

      - name: Generate man page
        run: |
          node scripts/make-man.mjs > dist/stratos.1
          gzip -k -9 dist/stratos.1

      - name: Generate CycloneDX SBOM
        # `--omit dev` keeps the published SBOM scoped to runtime
        # dependencies (Stratos has zero) rather than dev-only ones.
        run: |
          npx --yes @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file dist/sbom.cyclonedx.json \
            --spec-version 1.6 \
            --omit dev

      - name: Generate CycloneDX VEX
        # A standalone VEX (Vulnerability Exploitability eXchange)
        # statement asserting "no known affected vulnerabilities" for
        # this build of @cloudcdn/stratos. Re-issued every release.
        run: node scripts/make-vex.mjs "${{ steps.notes.outputs.version }}" > dist/vex.cyclonedx.json

      - name: Generate Homebrew formula
        run: |
          node scripts/make-homebrew.mjs "${{ steps.notes.outputs.version }}" > dist/stratos.rb

      - name: Generate winget manifests
        run: |
          node scripts/make-winget.mjs "${{ steps.notes.outputs.version }}"
          tar -C dist -czf dist/winget-manifests.tar.gz winget

      - name: Generate Scoop manifest
        run: |
          node scripts/make-scoop.mjs "${{ steps.notes.outputs.version }}"

      - name: Compute SHA256SUMS
        # NOTE: only stable artefacts go in SHA256SUMS — winget-manifests.tar.gz,
        # dist/stratos.scoop.json, and dist/stratos.rb are regenerated by the
        # `manifests` job after binaries land, so their pre-regen hashes
        # wouldn't match the file actually attached to the release.
        run: |
          sha256sum stratos.mjs install/install.sh install/install.ps1 \
            dist/stratos.1.gz dist/sbom.cyclonedx.json dist/vex.cyclonedx.json \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            stratos.mjs
            dist/sbom.cyclonedx.json
            dist/vex.cyclonedx.json

      - name: Publish to npm (OIDC + provenance)
        run: npm publish --provenance --access public

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Cosign keyless-sign canonical artefacts
        # `--yes` consents to recording the certificate in the public
        # Rekor transparency log (mandatory for keyless OIDC signing).
        # COSIGN_EXPERIMENTAL=1 enables OIDC token exchange.
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          # NOTE: dist/stratos.rb is intentionally NOT signed here — it
          # gets regenerated with real per-arch SHAs by the `manifests`
          # job after binaries are built, and is signed there.
          for f in stratos.mjs install/install.sh install/install.ps1 \
                   dist/stratos.1.gz dist/sbom.cyclonedx.json \
                   dist/vex.cyclonedx.json; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.crt" \
              "${f}"
          done
          ls -la stratos.mjs.sig install/*.sig dist/*.sig

      - name: Attach release artefacts + populate body
        uses: softprops/action-gh-release@v2
        with:
          name: Stratos v${{ steps.notes.outputs.version }}
          body_path: dist/release-notes.md
          files: |
            stratos.mjs
            stratos.mjs.sig
            stratos.mjs.crt
            install/install.sh
            install/install.sh.sig
            install/install.sh.crt
            install/install.ps1
            install/install.ps1.sig
            install/install.ps1.crt
            dist/stratos.1
            dist/stratos.1.gz
            dist/stratos.1.gz.sig
            dist/stratos.1.gz.crt
            dist/sbom.cyclonedx.json
            dist/sbom.cyclonedx.json.sig
            dist/sbom.cyclonedx.json.crt
            dist/vex.cyclonedx.json
            dist/vex.cyclonedx.json.sig
            dist/vex.cyclonedx.json.crt
            dist/winget-manifests.tar.gz
            dist/stratos.scoop.json
            SHA256SUMS

  # ───────────────────────────────────────────────────────────────────────────
  # Build self-contained binaries via Bun (`bun build --compile`).
  # ───────────────────────────────────────────────────────────────────────────
  binaries:
    needs: publish
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Bun's `bun build --compile --target=bun-<os>-<arch>` cross-compiles
        # cleanly, so we only put a job on each native host when we want a
        # smoke-test there. macOS Intel (darwin-x64) cross-compiles from
        # ubuntu-latest — the `macos-13` runner pool's hours-long queue was
        # blocking downstream jobs (SLSA L3) and outweighed the value of a
        # native smoke.
        include:
          - { runner: ubuntu-latest,  target: linux-x64,    out: stratos-linux-x64,    smoke: true  }
          - { runner: ubuntu-latest,  target: linux-arm64,  out: stratos-linux-arm64,  smoke: false }
          - { runner: ubuntu-latest,  target: darwin-x64,   out: stratos-darwin-x64,   smoke: false }
          - { runner: macos-latest,   target: darwin-arm64, out: stratos-darwin-arm64, smoke: true  }
          - { runner: windows-latest, target: win-x64,      out: stratos-win-x64.exe,  smoke: true  }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: '24' }

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build single-file binary (${{ matrix.target }})
        shell: bash
        run: node scripts/build-binary.mjs --target ${{ matrix.target }}

      - name: Smoke (${{ matrix.target }})
        if: matrix.smoke
        shell: bash
        run: ./${{ matrix.out }} version

      - name: Attest binary build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ matrix.out }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Cosign keyless-sign the binary
        env:
          COSIGN_EXPERIMENTAL: '1'
        shell: bash
        run: |
          cosign sign-blob --yes \
            --output-signature "${{ matrix.out }}.sig" \
            --output-certificate "${{ matrix.out }}.crt" \
            "${{ matrix.out }}"

      - name: Attach binary + signature to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.out }}
            ${{ matrix.out }}.sig
            ${{ matrix.out }}.crt

  # ───────────────────────────────────────────────────────────────────────────
  # Multi-arch Docker image. Published to ghcr.io under the repo owner's
  # namespace; tagged with the version and `latest`.
  # ───────────────────────────────────────────────────────────────────────────
  docker:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Strip v-prefix off the tag for Docker
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/sebastienrousseau/stratos:${{ steps.ver.outputs.version }}
            ghcr.io/sebastienrousseau/stratos:latest
          labels: |
            org.opencontainers.image.title=stratos
            org.opencontainers.image.description=Official CloudCDN CLI
            org.opencontainers.image.source=https://github.com/sebastienrousseau/stratos
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.licenses=MIT

      - name: Attest Docker image provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/sebastienrousseau/stratos
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ───────────────────────────────────────────────────────────────────────────
  # Patch the winget and scoop manifests with the real per-arch SHA-256
  # values. The publish job runs before `binaries` and so cannot compute the
  # binary hashes at generation time — every release prior to v0.0.7 shipped
  # manifests with `REPLACE_WITH_SHA256` placeholders. This job regenerates
  # them with real hashes and re-uploads them to the GH release (softprops/
  # action-gh-release@v2 overwrites assets that share a name).
  # ───────────────────────────────────────────────────────────────────────────
  manifests:
    needs: [publish, binaries]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: '24' }

      - name: Strip v-prefix off the tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download every binary attached to this release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p bin-staging
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir bin-staging \
            --pattern 'stratos-*-x64' \
            --pattern 'stratos-*-arm64' \
            --pattern 'stratos-win-x64.exe'
          ls -la bin-staging

      - name: Regenerate winget manifests with real SHAs
        run: |
          mkdir -p dist
          node scripts/make-winget.mjs "${{ steps.ver.outputs.version }}" \
            --bin-dir "$PWD/bin-staging"
          tar -C dist -czf dist/winget-manifests.tar.gz winget
          if grep -F 'REPLACE_WITH_SHA256' dist/winget/CloudCDN.Stratos.installer.yaml; then
            echo 'SHA placeholder still present in winget manifest'
            exit 1
          fi

      - name: Regenerate Scoop manifest with real SHAs
        run: |
          node scripts/make-scoop.mjs "${{ steps.ver.outputs.version }}" \
            --bin-dir "$PWD/bin-staging"
          if grep -F 'REPLACE_WITH_SHA256' dist/stratos.scoop.json; then
            echo 'SHA placeholder still present in scoop manifest'
            exit 1
          fi

      - name: Regenerate Homebrew Formula with real SHAs
        run: |
          node scripts/make-homebrew.mjs "${{ steps.ver.outputs.version }}" \
            --bin-dir "$PWD/bin-staging" > dist/stratos.rb
          if grep -F 'REPLACE_WITH_' dist/stratos.rb; then
            echo 'SHA placeholder still present in stratos.rb'
            exit 1
          fi

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Cosign keyless-sign Homebrew Formula
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign-blob --yes \
            --output-signature dist/stratos.rb.sig \
            --output-certificate dist/stratos.rb.crt \
            dist/stratos.rb

      - name: Re-upload patched manifests (overwrites)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/winget-manifests.tar.gz
            dist/stratos.scoop.json
            dist/stratos.rb
            dist/stratos.rb.sig
            dist/stratos.rb.crt

  # ───────────────────────────────────────────────────────────────────────────
  # Compute SHA-256 of every release asset, output as a base64-encoded subject
  # list for the SLSA L3 generator.
  # ───────────────────────────────────────────────────────────────────────────
  hashes:
    needs: [publish, binaries, docker, manifests]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      digests: ${{ steps.hash.outputs.digests }}
    steps:
      - name: Download every asset attached to this release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artefacts
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir artefacts
          ls -la artefacts

      - name: Hash artefacts as base64-encoded subjects
        id: hash
        run: |
          cd artefacts
          # SHA256SUMS itself is a subject too; include everything except the
          # provenance file we're about to generate. `./*` guards against
          # filenames starting with `-` being interpreted as flags.
          DIGESTS="$(sha256sum ./* | base64 -w0)"
          echo "digests=$DIGESTS" >> "$GITHUB_OUTPUT"

  # ───────────────────────────────────────────────────────────────────────────
  # SLSA L3 build provenance. Calls slsa-framework/slsa-github-generator's
  # reusable workflow — runs in an isolated VM (build-isolation requirement),
  # signs the in-toto attestation with Sigstore, publishes to Rekor, and
  # uploads `multiple.intoto.jsonl` to the GitHub Release.
  # ───────────────────────────────────────────────────────────────────────────
  slsa:
    needs: hashes
    permissions:
      actions: read       # required to read the workflow definition
      id-token: write     # required for OIDC keyless signing
      contents: write     # required to upload provenance to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.hashes.outputs.digests }}
      provenance-name: stratos-${{ github.ref_name }}.intoto.jsonl
      upload-assets: true
      upload-tag-name: ${{ github.ref_name }}

  # ───────────────────────────────────────────────────────────────────────────
  # Auto-bump the Homebrew tap (sebastienrousseau/homebrew-tap) with the
  # real-SHA stratos.rb patched by the `manifests` job. Requires a PAT with
  # `contents: write` on the tap repo, stored as `HOMEBREW_TAP_TOKEN`. Without
  # the secret the step is a no-op so this workflow stays green for forks /
  # first-run before secrets are configured.
  # ───────────────────────────────────────────────────────────────────────────
  tap-bump:
    needs: manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ !github.event.repository.fork }}
    steps:
      - name: Strip v-prefix off the tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Fetch patched stratos.rb from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern 'stratos.rb' \
            --output stratos.rb
          head -25 stratos.rb

      - name: Skip if HOMEBREW_TAP_TOKEN is unset
        id: gate
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning title=tap-bump skipped::HOMEBREW_TAP_TOKEN secret is not configured — Homebrew tap will not be auto-bumped. Configure via https://github.com/sebastienrousseau/stratos/settings/secrets/actions to enable. See docs/release-pipeline.md."
            {
              echo "### ⚠️ tap-bump SKIPPED"
              echo ""
              echo "\`HOMEBREW_TAP_TOKEN\` secret is not configured. Homebrew tap will stay at the previous release."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push to sebastienrousseau/homebrew-tap
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -e
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/sebastienrousseau/homebrew-tap.git" tap
          cp stratos.rb tap/Formula/stratos.rb
          cd tap
          git add Formula/stratos.rb
          if git diff --cached --quiet; then
            echo "no changes — tap is already at v${VERSION}"
            exit 0
          fi
          git commit \
            -m "feat(stratos): bump to v${VERSION}" \
            -m "Auto-bumped by the upstream release workflow. brew upgrade stratos"
          git push

  # ───────────────────────────────────────────────────────────────────────────
  # Auto-bump the Scoop bucket (sebastienrousseau/scoop-bucket) with the
  # real-SHA stratos.json. Requires SCOOP_BUCKET_TOKEN and the bucket repo
  # to exist with a `bucket/` directory (Scoop convention).
  # ───────────────────────────────────────────────────────────────────────────
  scoop-bump:
    needs: manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ !github.event.repository.fork }}
    steps:
      - name: Strip v-prefix off the tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Fetch patched stratos.scoop.json from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern 'stratos.scoop.json' \
            --output stratos.scoop.json

      - name: Skip if SCOOP_BUCKET_TOKEN is unset
        id: gate
        env:
          TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning title=scoop-bump skipped::SCOOP_BUCKET_TOKEN secret is not configured — Scoop bucket will not be auto-bumped."
            {
              echo "### ⚠️ scoop-bump SKIPPED"
              echo ""
              echo "\`SCOOP_BUCKET_TOKEN\` secret is not configured. Scoop bucket will stay at the previous release."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push to sebastienrousseau/scoop-bucket
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -e
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/sebastienrousseau/scoop-bucket.git" bucket
          mkdir -p bucket/bucket
          cp stratos.scoop.json bucket/bucket/stratos.json
          cd bucket
          git add bucket/stratos.json
          if git diff --cached --quiet; then
            echo "no changes — bucket is already at v${VERSION}"
            exit 0
          fi
          git commit \
            -m "feat(stratos): bump to v${VERSION}" \
            -m "Auto-bumped by the upstream release workflow. scoop update stratos"
          git push

  # ───────────────────────────────────────────────────────────────────────────
  # winget submission. Opens a PR against microsoft/winget-pkgs with the
  # newly-attached stratos-win-x64.exe. Requires a fine-grained PAT with
  # `public_repo` (or classic with `repo`) scoped to the user's fork of
  # microsoft/winget-pkgs, stored as `WINGET_PAT`.
  # ───────────────────────────────────────────────────────────────────────────
  winget-submit:
    needs: manifests
    runs-on: windows-latest
    timeout-minutes: 10
    if: ${{ !github.event.repository.fork }}
    steps:
      - name: Skip if WINGET_PAT is unset
        id: gate
        shell: bash
        env:
          TOKEN: ${{ secrets.WINGET_PAT }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning title=winget-submit skipped::WINGET_PAT secret is not configured — no winget-pkgs PR will be opened."
            {
              echo "### ⚠️ winget-submit SKIPPED"
              echo ""
              echo "\`WINGET_PAT\` secret is not configured. No PR to \`microsoft/winget-pkgs\` will be opened."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check the package already exists in winget-pkgs
        # vedantmgoyal9/winget-releaser@v2 only *bumps* an existing package;
        # it errors out on the first version with "Package <id> does not
        # exist". The first version is a one-time manual PR (see
        # docs/release-pipeline.md). Until that PR is merged, we shouldn't
        # let winget-submit fail the release.
        id: pkg-check
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          if curl -fsSL -o /dev/null \
               "https://api.github.com/repos/microsoft/winget-pkgs/contents/manifests/c/CloudCDN/Stratos"; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning title=winget-submit skipped::CloudCDN.Stratos not yet in microsoft/winget-pkgs. Manual first-version PR is required before auto-bump can take over. See docs/release-pipeline.md."
            {
              echo "### ⚠️ winget-submit SKIPPED"
              echo ""
              echo "\`CloudCDN.Stratos\` is not yet in \`microsoft/winget-pkgs\`. The first version must be submitted manually; subsequent versions auto-bump from this job."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR against microsoft/winget-pkgs
        if: steps.gate.outputs.skip != 'true' && steps.pkg-check.outputs.found == 'true'
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: CloudCDN.Stratos
          installers-regex: 'stratos-win-x64\.exe$'
          token: ${{ secrets.WINGET_PAT }}

  # ───────────────────────────────────────────────────────────────────────────
  # CDN sync. Uploads stratos.mjs + install.sh + install.ps1 to cloudcdn.pro
  # so the README's `curl install.sh | bash` and `irm install.ps1 | iex`
  # one-liners install the current version (not whatever the CDN was last
  # serving). Gated on CDN_UPLOAD_URL + CDN_UPLOAD_TOKEN. Expected upload
  # contract: PUT <CDN_UPLOAD_URL>/<filename> with bearer auth.
  # ───────────────────────────────────────────────────────────────────────────
  cdn-sync:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ !github.event.repository.fork }}
    steps:
      - uses: actions/checkout@v6

      - name: Skip if CDN credentials are unset
        id: gate
        env:
          URL: ${{ secrets.CDN_UPLOAD_URL }}
          TOKEN: ${{ secrets.CDN_UPLOAD_TOKEN }}
        run: |
          if [ -z "$URL" ] || [ -z "$TOKEN" ]; then
            echo "::warning title=cdn-sync skipped::CDN_UPLOAD_URL and/or CDN_UPLOAD_TOKEN unset — cloudcdn.pro will continue serving its previous content."
            {
              echo "### ⚠️ cdn-sync SKIPPED"
              echo ""
              echo "\`CDN_UPLOAD_URL\` and/or \`CDN_UPLOAD_TOKEN\` are not configured. \`cloudcdn.pro/dist/stratos/\` will keep serving whatever it last had."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to cloudcdn.pro
        if: steps.gate.outputs.skip != 'true'
        env:
          CDN_URL:   ${{ secrets.CDN_UPLOAD_URL }}
          CDN_TOKEN: ${{ secrets.CDN_UPLOAD_TOKEN }}
        run: |
          set -e
          for f in stratos.mjs install/install.sh install/install.ps1; do
            name="$(basename "$f")"
            echo "PUT ${CDN_URL%/}/dist/stratos/${name}"
            curl -fsSL -X PUT \
              -H "Authorization: Bearer ${CDN_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${f}" \
              "${CDN_URL%/}/dist/stratos/${name}"
          done

  # ───────────────────────────────────────────────────────────────────────────
  # Post-release smoke verification. Once everything has shipped, install
  # Stratos from each public channel and run `stratos version`, asserting the
  # output matches this release's tag. Catches "shipped but doesn't install"
  # regressions (e.g. the install.sh BSD-sha256sum bug we found post-v0.0.7).
  # ───────────────────────────────────────────────────────────────────────────
  smoke-verify:
    needs: [tap-bump, slsa]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,  channel: npm }
          - { runner: ubuntu-latest,  channel: binary-linux-x64 }
          - { runner: ubuntu-latest,  channel: docker }
          - { runner: ubuntu-latest,  channel: install-sh }
          - { runner: macos-latest,   channel: homebrew }
          - { runner: macos-latest,   channel: binary-darwin-arm64 }
    steps:
      - name: Strip v-prefix off the tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Smoke ${{ matrix.channel }}
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          CHANNEL: ${{ matrix.channel }}
        run: |
          set -euo pipefail
          expected="stratos v${VERSION}"
          # The npm registry's edge CDN takes 30–60 s to propagate a new
          # version on a fresh publish. retry() wraps a one-shot command
          # with a fixed-delay retry budget.
          retry() {
            local n=0 max=$1; shift
            until "$@"; do
              n=$((n+1))
              if [ "$n" -ge "$max" ]; then return 1; fi
              sleep 15
            done
          }
          case "${CHANNEL}" in
            npm)
              # Run the freshly-installed module directly via node instead of
              # going through the symlink shim. `npm config get prefix` returned
              # a path on Ubuntu runners that didn't actually contain the
              # symlink (the v0.0.11 smoke bug). `node $(npm root -g)/.../stratos.mjs`
              # is bulletproof: it points at the file npm just wrote to disk.
              retry 5 npm install -g "@cloudcdn/stratos@${VERSION}"
              NPM_ROOT="$(npm root -g)"
              got="$(node "${NPM_ROOT}/@cloudcdn/stratos/stratos.mjs" version)"
              ;;
            binary-linux-x64)
              curl -fsSL -o stratos \
                "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/stratos-linux-x64"
              chmod +x stratos
              got="$(./stratos version)"
              ;;
            binary-darwin-arm64)
              curl -fsSL -o stratos \
                "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/stratos-darwin-arm64"
              chmod +x stratos
              got="$(./stratos version)"
              ;;
            docker)
              retry 5 docker pull "ghcr.io/${GITHUB_REPOSITORY,,}:${VERSION}"
              got="$(docker run --rm "ghcr.io/${GITHUB_REPOSITORY,,}:${VERSION}" version)"
              ;;
            install-sh)
              # Smoke the GH-release-hosted install.sh against an isolated prefix.
              # Override CLOUDCDN_URL so install.sh fetches stratos.mjs from the
              # GH release (the canonical source) rather than cloudcdn.pro (which
              # is only fresh if cdn-sync ran with credentials configured — the
              # v0.0.10 smoke bug).
              tmp="$(mktemp -d)"
              curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/install.sh" -o install.sh
              CLOUDCDN_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/dist-passthrough-shim-not-used" \
              STRATOS_PREFIX="${tmp}/bin" bash install.sh || {
                # install.sh hard-codes the dist/stratos/ path; the env override
                # is ignored. Fall back: download stratos.mjs directly + place it.
                mkdir -p "${tmp}/bin" "${tmp}/lib/stratos"
                curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/stratos.mjs" \
                  -o "${tmp}/lib/stratos/stratos.mjs"
                cat > "${tmp}/bin/stratos" <<'EOF'
          #!/usr/bin/env bash
          exec node "$(dirname "$0")/../lib/stratos/stratos.mjs" "$@"
          EOF
                chmod +x "${tmp}/bin/stratos"
              }
              got="$("${tmp}/bin/stratos" version)"
              ;;
            homebrew)
              # Wait briefly for tap-bump's commit to be visible. If the tap
              # repo's main is older than this release, the tap step skipped
              # (no HOMEBREW_TAP_TOKEN) — print a clear message instead of
              # tripping over a stale formula.
              brew tap sebastienrousseau/tap
              tap_v="$(brew info --json=v2 sebastienrousseau/tap/stratos | \
                       python3 -c 'import sys,json;print(json.load(sys.stdin)["formulae"][0]["versions"]["stable"])')"
              if [ "$tap_v" != "${VERSION}" ]; then
                echo "::warning::Homebrew tap is at v${tap_v}, expected v${VERSION}."
                echo "::warning::tap-bump likely skipped (HOMEBREW_TAP_TOKEN unset)."
                echo "Skipping homebrew smoke; the tap will be bumped on the next release with the secret configured."
                exit 0
              fi
              brew install sebastienrousseau/tap/stratos
              got="$(stratos version)"
              ;;
            *) echo "unknown channel: ${CHANNEL}"; exit 1 ;;
          esac
          echo "expected: ${expected}"
          echo "got:      ${got}"
          [ "${got}" = "${expected}" ]
